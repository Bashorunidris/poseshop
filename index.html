    <style>
        /* ====== CSS Variables for Theme ====== */
        :root {
            --primary: #4C1D95;
            --primary-light: #6D28D9;
            --primary-dark: #3B0764;
            --bg-main: #f7f8fb;
            --bg-card: #ffffff;
            --text-primary: #111;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #FF0050;
            --success: #4CAF50;
        }

        /* Gifts Tab Styles */
        .gift-claim-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08) !important;
            border-color: rgba(138,43,226,0.4) !important;
        }
        .claim-all-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
        .claim-all-btn:active {
            transform: scale(0.95);
        }

        /* ====== Reset & Base ====== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-main);
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition)
        }

        button {
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition)
        }

        img {
            max-width: 100%;
            display: block
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px
        }

        /* RESPONSIVE CONTAINER */
        @media (max-width: 1024px) {
            .container {
                padding: 20px;
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }
        }

        /* Modal Styles - FULL PAGE */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 2000;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            animation: slideInRight 0.3s ease-out;
        }

        .modal-overlay.active {
            display: block;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        .modal-overlay.closing {
            animation: slideOutRight 0.3s ease-out;
        }

        .modal {
            background: #000000;
            border-radius: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            color: white;
            position: relative;
            box-shadow: none;
            display: flex;
            flex-direction: column;
        }

        .modal-close {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            z-index: 2001;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }

        /* ====== FULLSCREEN VIDEO PLAYER ====== */
        #fullscreenVideo {
            width: 100% !important;
            height: 100% !important;
        }

        #fullscreenVideo::-webkit-media-controls {
            display: flex !important;
            opacity: 1 !important;
        }

        #fullscreenVideo::-webkit-media-controls-panel {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent) !important;
            display: flex !important;
        }

        #fullscreenVideo::-webkit-media-controls-play-button {
            width: 50px !important;
            height: 50px !important;
        }

        #fullscreenVideo::-webkit-media-controls-volume-control-container {
            display: flex !important;
        }

        #fullscreenVideo::-webkit-media-controls-fullscreen-button {
            display: flex !important;
        }

        /* 🚫 Profile media fullscreen viewer: hide profile name, followers,
           and profile image (owner viewing their own media doesn't need it).
           NOTE: scoped with :not([data-source="liked"]) so liked-tab videos
           still show the original creator's profile info. */
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-section,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-container,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-info,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-name,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-name-wrapper,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-caption,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-profile-pic,
        #profileMediaFullscreen:not([data-source="liked"]) [id^="forYouFollowBadge-"],
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-follow-icon-badge,
        #profileMediaFullscreen:not([data-source="liked"]) .forYou-caption,
        #profileMediaFullscreen:not([data-source="liked"]) .see-more-btn {
            display: none !important;
        }

        /* When the profile-media fullscreen viewer is open, lift the comment
           modal, share menu, and any other interaction popups ABOVE it so the
           Comment / Share / Repost buttons actually appear when clicked.
           (#profileMediaFullscreen sits at z-index:9998; these were 999–1000.) */
        body:has(#profileMediaFullscreen) .comment-modal,
        body:has(#profileMediaFullscreen) .comment-modal-overlay,
        body:has(#profileMediaFullscreen) #commentModalOverlay,
        body:has(#profileMediaFullscreen) .share-menu,
        body:has(#profileMediaFullscreen) #shareMenu {
            z-index: 2147483646 !important;
        }

        /* Same hiding rule when a profile video is opened in the For You feed
           via the back-button container path. */
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-section,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-container,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-info,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-name,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-name-wrapper,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-caption,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-profile-pic,
        #forYouFeed:has(#profileVideoBackButtonContainer) [id^="forYouFollowBadge-"],
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-follow-icon-badge,
        #forYouFeed:has(#profileVideoBackButtonContainer) .forYou-caption,
        #forYouFeed:has(#profileVideoBackButtonContainer) .see-more-btn {
            display: none !important;
        }

        .modal h2 {
            margin: 20px 0;
            font-size: 20px;
            padding: 0 20px;
        }

        .modal input {
            width: calc(100% - 40px);
            padding: 12px;
            margin: 0 20px 15px 20px;
            background: #2a2a2a;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 14px;
            transition: var(--transition);
        }

        .modal input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-btn {
            width: calc(100% - 40px);
            padding: 12px;
            margin: 10px 20px;
            background: linear-gradient(45deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
        }

        .modal-btn:hover {
            opacity: 0.9;
        }

        .modal-switch {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            padding: 0 20px;
        }

        .modal-switch a {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
        }

        .error-msg {
            background: #e74c3c;
            color: #fff;
            padding: 10px;
            border-radius: var(--radius-sm);
            margin: 0 20px 15px 20px;
            font-size: 14px;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.2s ease-out;
        }

        .error-msg.success {
            background: var(--success);
        }

        .password-requirements {
            list-style: none;
            margin: -6px 20px 12px 20px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: var(--radius-sm);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
        }

        .password-requirements li {
            font-size: 12px;
            color: var(--text-secondary, #888);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }

        .password-requirements li i {
            font-size: 6px;
            color: #ccc;
            transition: color 0.2s ease;
        }

        .password-requirements li.met {
            color: var(--success);
        }

        .password-requirements li.met i {
            color: var(--success);
        }

        .password-requirements li.met i:before {
            content: "\f00c";
            font-size: 10px;
        }

            min-height: 100dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(15px, 3vw, 20px);
            animation: fadeIn 0.5s ease-out;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: y mandatory;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: min(90%, 400px);
            padding: clamp(20px, 5vw, 30px);
            animation: slideUp 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: clamp(20px, 5vw, 30px);
            background: #333333;
            border-radius: 10px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: clamp(12px, 3vw, 15px);
            border: none;
            background: none;
            font-size: clamp(14px, 4vw, 16px);
            cursor: pointer;
            color: #ffffff;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: #ffffff;
            background: hsla(286, 92%, 14%, 1);
            border-radius: 8px;
        }

        .auth-forms {
            display: flex;
            flex-direction: column;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .auth-toggle {
            display: flex;
            margin-bottom: clamp(15px, 4vw, 20px);
            background: #333333;
            border-radius: 8px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: clamp(10px, 3vw, 12px);
            border: none;
            background: none;
            cursor: pointer;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: hsla(286, 92%, 14%, 0.858);
            color: white;
            border-radius: 6px;
            transform: scale(1.02);
        }

        .auth-form {
            transition: all 0.3s ease-in-out;
            display: none;

        .auth-form.active {
            display: block;
        }

        .auth-form input {
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            margin-bottom: clamp(12px, 3vw, 15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: clamp(14px, 4vw, 16px);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }

        .auth-form input:focus {
            outline: none;
            border-color: hsla(286, 92%, 14%, 1);
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-form input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

            padding: clamp(12px, 3vw, 15px);
